services:
  app:
    build: .
    container_name: sibima-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - app-src:/var/www
    environment:
      APP_NAME: SIBIMA
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: sibima
      DB_USERNAME: sibima
      DB_PASSWORD: sibima_secret
      LOG_CHANNEL: stderr
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sibima

  web:
    image: nginx:alpine
    container_name: sibima-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - app-src:/var/www:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - sibima

  db:
    image: mysql:8
    container_name: sibima-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sibima
      MYSQL_USER: sibima
      MYSQL_PASSWORD: sibima_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - sibima-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sibima

volumes:
  app-src:
  sibima-db:

networks:
  sibima:
